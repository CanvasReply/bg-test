<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <style>
        .main {
            min-height: 100vh;
            min-width: 100vw;
            overflow: hidden;
            background: linear-gradient(135deg, #66072d 0%, #020b24 40%, #020b24 100%);
            position: relative;
        }
        .masked-layer {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a6aff;
            mask-image: url('mask.png');
            mask-size: cover;
            mask-repeat: no-repeat;
            -webkit-mask-image: url('mask.png');
            -webkit-mask-size: cover;
            -webkit-mask-repeat: no-repeat;
        }

        .ray {
                position: absolute;
                background: radial-gradient(ellipse at 50% 50%, rgba(103,152,255,0.18) 0%, rgba(103,152,255,0.05) 70%, rgba(103,152,255,0) 100%);
                border-radius: 50% / 20%;  /* эллипс */
                pointer-events: none;
                mix-blend-mode: lighten;
                filter: blur(10px);
                opacity: 0.7;
                transform: rotate(48deg);
        }

        .not-moving-left-bottom-1 {
            width: 500px;
            height: 100px;
            left: -80px;
            bottom: 150px;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="masked-layer">
        <div class="ray not-moving-left-bottom-1"></div>
    </div>
</div>

</body>
</html>
