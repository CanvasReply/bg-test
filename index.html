    <title>Variant 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <style>
        :root {
            --rot-30: 32deg;
            --ins-30: -100% -25%;
            --bm: darken;
        }

        .wrapper {
            width: 100vw;
            height: 100vh;
            padding: 20%;
            position: relative;
            background: black;
            box-sizing: border-box;
        }

        .red-blue-background {
            border: 1px solid dimgrey;
            background: linear-gradient(135deg, #66072d 0%, #020b24 20%, #020b24 100%);
            /*overflow: hidden;*/
            position: relative;
            /*filter: blur(5px);*/
            /*will-change: filter;*/

            /* main variant - full hd, 2k, 4k */
            aspect-ratio: 16 / 9;
            /* variant 1 */
            /*aspect-ratio: 5 / 2;*/
            /* variant 2 */
            /*aspect-ratio: 8 / 5;*/
            /* variant 3 */
            /*height: 100%;*/
            /*width: 100%;*/
        }


        .static-rays-40 { /* 40 */
            rotate: 40deg;
            background:
                radial-gradient(
                    12% 3% at 25% 65%,
                    /*rgb(255, 0, 0) 0%,*/
                    rgba(0, 100, 255, 0.1) 0%,
                    rgba(0, 100, 255, 0.1) 35%,
                    transparent 100%
                );
            pointer-events: none;
            position: absolute;
            z-index: 1;
            inset: var(--ins-30);
        }

        .static-rays-32 { /* 32 */
            rotate: var(--rot-30);
            inset: var(--ins-30);
            background-blend-mode: var(--bm);
            background:
                radial-gradient(
                    23% 4% at 45% 63%,
                    rgba(0, 100, 255, 0.1) 0%,
                    rgba(0, 100, 255, 0.1) 15%,
                    transparent 100%

                radial-gradient(
                    47% 12% at 49% 50%,
                    rgba(0, 100, 255, 0.01) 0%,
                    rgba(0, 100, 255, 0.01) 90%,
                    transparent 100%
                ),
                radial-gradient(
                    24% 4% at 44% 50%,
                    rgba(0, 100, 255, 0.15) 0%,
                    rgba(0, 100, 255, 0.15) 15%,
                    transparent 100%

            /*                rgba(0, 100, 255, 0.15) 0%,*/
            /*                rgba(0, 100, 255, 0.15) 80%,*/
            /*                transparent 100%*/
            /*        ),*/
            /*        radial-gradient(*/

            /*                rgba(0, 100, 255, 0.35) 0%,*/
            /*                rgba(0, 100, 255, 0.35) 80%,*/

            /*                transparent 100%*/
            /*        );*/
            pointer-events: none;
            position: absolute;
            z-index: 1;
        }

        .static-rays-0 { /* 0 */
            background-blend-mode: var(--bm);
            background:
                radial-gradient(
                    12% 5% at 4% 13%,
                    rgba(0, 100, 255, 0.08) 0%,
                    rgba(0, 100, 255, 0.08) 45%,
                    transparent 100%

                /*    35% 3% at 55% 81%,*/

                /*    rgba(0, 100, 255, 1) 80%,*/

        .waves {
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            position: relative;
            perspective: 800px;
        }


        .wave {
            rotate: var(--rot-30);
            inset: var(--ins-30);
            background-blend-mode: var(--bm);
            perspective: 800px;
            background:

        .wave-1 {
            transform-origin: 100% 80%;
            /*background: rgba(102, 255, 60, 0.5);*/
            animation: moveWave2k 2s linear infinite forwards;
        }

        .wave-2 {
            transform-origin: 110% 52%;
            /*background: rgba(193, 84, 255, 0.5);*/
            animation-delay: 0.3s;
            animation: moveWave2k 8s linear infinite forwards;
        }

        @keyframes moveWave2k {
            0% {
                transform: scaleX(1) scaleY(1) scaleZ(1);
            }
            40% {
                /*transform: translate(10%, -20%) scaleX(0.8) scaleY(1.2) scaleZ(1.5);*/
                transform: scaleX(0.8) scaleY(0.6) scaleZ(1.5);
            }
            100% {
                /*transform: translate(20%, -60%) scaleX(0.2) scaleY(1.7) scaleZ(3);*/
                transform: scaleX(0.2) scaleY(1.7) scaleZ(3);
            }

<body>
<div class="wrapper">
    <div class="red-blue-background">
        <div class="static-rays-0"></div>
        <div class="static-rays-40"></div>

        <div class="waves">
