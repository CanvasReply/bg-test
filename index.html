<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        .main {
            min-height: 100vh;
            min-width: 100vw;
            overflow: hidden;
            background: linear-gradient(135deg, #66072d 0%, #04163b 40%, #04163b 100%);
            position: relative;
        }

        .light-spot {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.17) 0%, rgba(255,255,255,0.06) 70%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: lighten;
            filter: blur(8px);
        }

        .spot1 {
            left: -150px;
            bottom: -100px;
            animation: move-spot1 5s linear infinite alternate;
        }

        .spot2 {
            left: 50px;
            bottom: 120px;
            width: 280px;
            height: 320px;
            opacity: 0.8;
            animation: move-spot2 6s linear infinite alternate;
        }

        .spot3 {
            left: -70px;
            bottom: 250px;
            width: 350px;
            height: 300px;
            opacity: 0.6;
            animation: move-spot3 7s linear infinite alternate;
        }

        @keyframes move-spot1 {
            from { transform: translate(0, 0) scale(1); opacity: 0.8; }
            to   { transform: translate(800px, -600px) scale(1.15); opacity: 0.4; }
        }
        @keyframes move-spot2 {
            from { transform: translate(0, 0) scale(1); opacity: 0.7; }
            to   { transform: translate(900px, -520px) scale(1.2); opacity: 0.3; }
        }
        @keyframes move-spot3 {
            from { transform: translate(0, 0) scale(1); opacity: 0.7; }
            to   { transform: translate(600px, -480px) scale(1.1); opacity: 0.2; }
        }
    </style>
</head>
<body>
<div class="main">
    <div class="light-spot spot1"></div>
    <div class="light-spot spot2"></div>
    <div class="light-spot spot3"></div>
</div>
</body>
</html>
