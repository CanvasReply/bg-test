<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Variant 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <style>
        :root {
            --c1: rgba(126, 167, 230, .36);
            --c2: rgba(126, 167, 230, .28);
            --c3: rgba(126, 167, 230, .22);

            --w2c1: rgba(126, 167, 230, .5);
            --w2c2: rgba(126, 167, 230, .7);

            /*--o: rgba(17, 255, 0, 0.9);*/
            --o: rgba(10, 105, 255, 0.9);
            --o-1: rgba(10, 105, 255, 0.4);


            --band: rgba(126, 167, 230, .18);

            --blur-1: 10px;
            --blur: 32px;
            --wave-1-dur: 8s;
            --wave-2-dur: 5s;
        }

        .main {
            width: 100vw;
            height: 100vh;
            /*background: black;*/
            background: linear-gradient(135deg, #66072d 0%, #020b24 25%, #020b24 100%);
            overflow: hidden;
        }

        .masked-layer {
            width: 100vw;
            height: 100vh;
            /*background: red;*/
            /*mask-image: url('mask.png');*/
            /*mask-repeat: no-repeat;*/
            /*mask-size: cover;*/
            /*-webkit-mask-size: cover;*/
            /*-webkit-mask-image: url('mask.png');*/
            /*-webkit-mask-repeat: no-repeat;*/
            opacity: 1;
        }

        .waves {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: none;
        }

        .layer-1 { /* 40 */
            rotate: 40deg;
            content: "";
            position: absolute;
            inset: -15%;
            background:
                    radial-gradient(
                        15% 7% at 20% 95%,
                        rgba(0, 100, 255, 0.5) 0%,
                        rgba(0, 100, 255, 0.5) 65%,
                        transparent 100%
                    );
                    /*radial-gradient(*/
                    /*    10% 15% at 43% 92%,*/
                    /*    rgba(0, 100, 255, 0.35) 0%,*/
                    /*    rgba(0, 100, 255, 0.35) 90%,*/
                    /*    transparent 100%*/
                    /*);*/
                    /*radial-gradient(60% 40% at 80% 56%, var(--o) 0%, transparent 82%);*/
            filter: blur(var(--blur));
            pointer-events: none;
            opacity: 0.45;
        }

        .layer-2 { /* 32 */
            rotate: 32deg;
            content: "";
            position: absolute;
            inset: -15%;
            background:
                radial-gradient(
                    13% 6% at 38% 90%,
                    rgba(0, 100, 255, 0.5) 0%,
                    rgba(0, 100, 255, 0.4) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    32% 20% at 37% 61%,
                    rgba(0, 100, 255, 0.25) 0%,
                    rgba(0, 100, 255, 0.2) 90%,
                    transparent 100%
                ),
                radial-gradient(
                    19% 8% at 37% 55%,
                    rgba(0, 100, 255, 0.35) 0%,
                    rgba(0, 100, 255, 0.35) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    7% 6% at 48% 85%,
                    rgba(0, 100, 255, 0.35) 0%,
                    rgba(0, 100, 255, 0.35) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    7% 6% at 54% 75%,
                    rgba(0, 100, 255, 0.35) 0%,
                    rgba(0, 100, 255, 0.35) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    12% 12% at 62% 58%,
                    rgba(0, 100, 255, 0.15) 0%,
                    rgba(0, 100, 255, 0.15) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    12% 12% at 59% 60%,
                    rgba(0, 100, 255, 0.15) 0%,
                    rgba(0, 100, 255, 0.15) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    8% 8% at 66% 54%,
                    rgba(0, 100, 255, 0.35) 0%,
                    rgba(0, 100, 255, 0.35) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    5% 5% at 74% 49%,
                    rgba(0, 100, 255, 0.35) 0%,
                    rgba(0, 100, 255, 0.35) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    32% 30% at 67% 20%,
                    rgba(0, 100, 255, 0.15) 0%,
                    rgba(0, 100, 255, 0.15) 80%,
                    transparent 100%
                );
            filter: blur(30px);
            pointer-events: none;
            opacity: 0.45;
        }

        .layer-3 { /* 0 / 0.35 */
            content: "";
            position: absolute;
            inset: -15%;
            background:
                radial-gradient(
                        11% 5% at 17% 25%,
                        rgba(0, 100, 255, 0.35) 0%,
                        rgba(0, 100, 255, 0.35) 80%,
                        transparent 100%
                ),
                radial-gradient(
                    35% 3% at 55% 81%,
                    rgba(0, 100, 255, 1) 0%,
                    rgba(0, 100, 255, 1) 80%,
                    transparent 100%
                );
            filter: blur(var(--blur));
            pointer-events: none;
            opacity: 0.35;
        }

        .layer-4 { /* 0 */
            content: "";
            position: absolute;
            inset: -15%;
            background:
                radial-gradient(
                    10% 1px at 35% 80%,
                    rgba(0, 100, 255, 0.25) 0%,
                    rgba(0, 100, 255, 0.25) 80%,
                    transparent 100%
                ),
                radial-gradient(
                    25% 1px at 75% 80%,
                    rgba(0, 100, 255, 0.25) 0%,
                    rgba(0, 100, 255, 0.25) 80%,
                    transparent 100%
                );
            /*radial-gradient(60% 40% at 80% 56%, var(--o) 0%, transparent 82%);*/
            filter: blur(2px);
            pointer-events: none;
            opacity: 0.2;
        }

        .wave-1 {
            content: "";
            position: absolute;
            inset: -15%;
            background:
                /*radial-gradient(40% 7% at 40% 50%, var(--o) 0%, transparent 64%),*/
                /*radial-gradient(40% 10% at 50% 86%, var(--o) 0%, transparent 82%),*/
                /*radial-gradient(60% 40% at 95% 24%, var(--o) 0%, transparent 82%),*/
                /*radial-gradient(60% 40% at 80% 76%, var(--o) 0%, transparent 82%),*/
                radial-gradient(60% 40% at 80% 56%, var(--o) 0%, transparent 82%);
                /*radial-gradient(85% 45% at 45% 55%,  var(--o) 0%, transparent 82%),*/
                /*radial-gradient(120% 55% at 110% 74%, var(--o) 0%, transparent 85%);*/
            filter: blur(var(--blur));
            pointer-events: none;
            rotate: 32deg;
            opacity: 0.6;
        }

        @keyframes moveWave1 {
            0% {
                transform: translate(0vmax, 0vmax) rotate(32deg) scale(1);
                opacity: .9;
            }
            100% {
                transform: translate(20vmax, 30vmax) rotate(32deg) scale(1);
                opacity: .9;
            }
        }

        @keyframes reveal { from { opacity: 0 } to { opacity: .8 } }
    </style>
</head>
<body>
    <div class="main">
        <div class="waves">
<!--            <div class="masked-layer"></div>-->
            <div class="layer-1"></div>
            <div class="layer-2"></div>
            <div class="layer-3"></div>
            <div class="layer-4"></div>
<!--            <div class="wave-1"></div>-->
        </div>
    </div>
</body>
