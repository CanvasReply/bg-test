<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <style>
        .main {
            min-height: 100vh;
            min-width: 100vw;
            overflow: hidden;
            background: linear-gradient(135deg, #66072d 0%, #020b24 40%, #020b24 100%);
            position: relative;
        }

        .masked-layer {
            width: 100vw;
            height: 100vh;
            background: #0a6aff;
            mask-image: url('mask.png');
            mask-repeat: no-repeat;
            mask-size: cover;
            -webkit-mask-size: cover;
            -webkit-mask-image: url('mask.png');
            -webkit-mask-repeat: no-repeat;
            opacity: 0.6;
        }

        .masked-layer-bg {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
        }

        .masked-layer-2 {
            position: absolute;
            z-index: 2;
            left: 0;
            top: 0;
            animation: flyAway 12s linear infinite forwards;
        }

        @keyframes flyAway {
            from {
                transform: translate(0, 0);
            }
            to {
                transform: translate(100vw, -80vh);
            }
        }

        .ray {
                position: absolute;
                background: radial-gradient(ellipse at 50% 50%, rgba(103,152,255,0.18) 0%, rgba(103,152,255,0.05) 70%, rgba(103,152,255,0) 100%);
                /*background: #0a6aff;*/
                border-radius: 50% / 20%;  /* эллипс */
                pointer-events: none;
                mix-blend-mode: lighten;
                filter: blur(10px);
                opacity: 0.7;
                z-index: 3;
                transform: rotate(34deg);
                animation: moveRay 7s linear infinite forwards;
        }

        .ray-group-1 {
            width: 500px;
            height: 100px;
        }

        .ray-group-1-item-1  {
            left: 180px;
            bottom: 120px;
        }

        .ray-group-1-item-2  {
            left: 340px;
            bottom: 120px;
        }

        @keyframes moveRay {
            0%   { transform: translate(0, 0) rotate(34deg) scale(1); opacity: 0.8; }
            100% { transform: translate(900px, -700px) rotate(54deg) scale(1.1); opacity: 0.6; }
        }
    </style>
</head>
<body>
<div class="main">
    <div class="masked-layer masked-layer-bg"></div>

    <div class="ray ray-group-1 ray-group-1-item-1"></div>
    <div class="ray ray-group-1 ray-group-1-item-2"></div>
<!--    <div class="masked-layer masked-layer-2"></div>-->
</div>

</body>
</html>
