<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Variant 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <style>
        :root {
        }

        .red-blue-background {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #66072d 0%, #020b24 25%, #020b24 100%);
            overflow: hidden;
            position: relative;
        }

        .static-rays-40 { /* 40 */
            rotate: 40deg;
            filter: blur(32px);
            opacity: 0.45;
            background:
                    radial-gradient(
                            15% 7% at 20% 95%,
                            rgba(0, 100, 255, 0.5) 0%,
                            rgba(0, 100, 255, 0.5) 65%,
                            transparent 100%
                    );
            pointer-events: none;
            position: absolute;
            z-index: 1;
            inset: -15%;
        }

        .static-rays-32 { /* 32 */
            rotate: 32deg;
            filter: blur(30px);
            opacity: 0.45;
            background:
                    radial-gradient(
                            13% 6% at 38% 90%,
                            rgba(0, 100, 255, 0.5) 0%,
                            rgba(0, 100, 255, 0.4) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            32% 20% at 37% 61%,
                            rgba(0, 100, 255, 0.25) 0%,
                            rgba(0, 100, 255, 0.2) 90%,
                            transparent 100%
                    ),
                    radial-gradient(
                            19% 8% at 37% 55%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            7% 6% at 48% 85%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            7% 6% at 54% 75%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            12% 12% at 62% 58%,
                            rgba(0, 100, 255, 0.15) 0%,
                            rgba(0, 100, 255, 0.15) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            12% 12% at 59% 60%,
                            rgba(0, 100, 255, 0.15) 0%,
                            rgba(0, 100, 255, 0.15) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            8% 8% at 66% 54%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            5% 5% at 74% 49%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            32% 30% at 67% 20%,
                            rgba(0, 100, 255, 0.15) 0%,
                            rgba(0, 100, 255, 0.15) 80%,
                            transparent 100%
                    );
            pointer-events: none;
            position: absolute;
            z-index: 1;
            inset: -15%;
        }

        .static-rays-0-35 { /* 0 / 0.35 */
            opacity: 0.35;
            filter: blur(32px);
            background:
                    radial-gradient(
                            11% 5% at 17% 25%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            35% 3% at 55% 81%,
                            rgba(0, 100, 255, 1) 0%,
                            rgba(0, 100, 255, 1) 80%,
                            transparent 100%
                    );
            position: absolute;
            inset: -15%;
            z-index: 1;
            pointer-events: none;
        }

        .static-rays-0-20 { /* 0 / 20 */
            opacity: 0.2;
            filter: blur(2px);
            background:
                    radial-gradient(
                            10% 1px at 35% 80%,
                            rgba(0, 100, 255, 0.25) 0%,
                            rgba(0, 100, 255, 0.25) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            25% 1px at 75% 80%,
                            rgba(0, 100, 255, 0.25) 0%,
                            rgba(0, 100, 255, 0.25) 80%,
                            transparent 100%
                    );
            position: absolute;
            inset: -15%;
            z-index: 1;
            pointer-events: none;
        }


        .waves {
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            position: relative;
        }


        .wave {
            content: "";
            position: absolute;
            inset: -15%;
            background:
                radial-gradient(
                    120% 55% at -10% 28%,
                    rgba(126, 167, 230, .36) 0%,
                    transparent 82%
                ),
                radial-gradient(
                    85% 45% at 45% 55%,
                    rgba(126, 167, 230, .28) 0%,
                    transparent 82%
                ),
                radial-gradient(
                    120% 55% at 110% 74%,
                    rgba(126, 167, 230, .22) 0%,
                    transparent 85%
                );
            filter: blur(30px);
            opacity: .95;
            pointer-events: none;
            animation:
                    moveWave1 8s linear infinite forwards;
        }

        @keyframes moveWave1 {
            0% {
                transform: translate(-60vmax, 30vmax) rotate(34deg) scale(1);
                opacity: 1;
            }
            60% {
                transform: translate(10vmax, 0vmax) rotate(40deg) scale(1);
                opacity: .8;
            }
            70% {
                transform: translate(20vmax, -12vmax) rotate(47deg) scale(1);
                opacity: .7;
            }
            100% {
                transform: translate(110vmax, 22vmax) rotate(54deg) scale(1.1);
                opacity: .6;
            }
        }
    </style>
</head>
<body>
<div class="red-blue-background">
    <div class="static-rays-40"></div>
    <div class="static-rays-32"></div>
    <div class="static-rays-0-35"></div>
    <div class="static-rays-0-20"></div>
    <div class="waves">
        <div class="wave"></div>
    </div>
</div>
</body>
