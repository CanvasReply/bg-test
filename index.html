<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Variant 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <style>
        :root {
        }

        .red-blue-background {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #66072d 0%, #020b24 25%, #020b24 100%);
            overflow: hidden;
            position: relative;
        }

        .static-rays-40 { /* 40 */
            rotate: 40deg;
            filter: blur(32px);
            opacity: 0.45;
            background:
                    radial-gradient(
                            15% 7% at 20% 95%,
                            rgba(0, 100, 255, 0.5) 0%,
                            rgba(0, 100, 255, 0.5) 65%,
                            transparent 100%
                    );
            pointer-events: none;
            position: absolute;
            z-index: 1;
            inset: -15%;
        }

        .static-rays-32 { /* 32 */
            rotate: 32deg;
            filter: blur(30px);
            opacity: 0.45;
            background:
                    radial-gradient(
                            13% 6% at 38% 90%,
                            rgba(0, 100, 255, 0.5) 0%,
                            rgba(0, 100, 255, 0.4) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            32% 20% at 37% 61%,
                            rgba(0, 100, 255, 0.25) 0%,
                            rgba(0, 100, 255, 0.2) 90%,
                            transparent 100%
                    ),
                    radial-gradient(
                            19% 8% at 37% 55%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            7% 6% at 48% 85%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            7% 6% at 54% 75%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            12% 12% at 62% 58%,
                            rgba(0, 100, 255, 0.15) 0%,
                            rgba(0, 100, 255, 0.15) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            12% 12% at 59% 60%,
                            rgba(0, 100, 255, 0.15) 0%,
                            rgba(0, 100, 255, 0.15) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            8% 8% at 66% 54%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            5% 5% at 74% 49%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            32% 30% at 67% 20%,
                            rgba(0, 100, 255, 0.15) 0%,
                            rgba(0, 100, 255, 0.15) 80%,
                            transparent 100%
                    );
            pointer-events: none;
            position: absolute;
            z-index: 1;
            inset: -15%;
        }

        .static-rays-0-35 { /* 0 / 0.35 */
            opacity: 0.35;
            filter: blur(32px);
            background:
                    radial-gradient(
                            11% 5% at 17% 25%,
                            rgba(0, 100, 255, 0.35) 0%,
                            rgba(0, 100, 255, 0.35) 80%,
                            transparent 100%
                    );
                    /*radial-gradient(*/
                    /*        35% 3% at 55% 81%,*/
                    /*        rgba(0, 100, 255, 1) 0%,*/
                    /*        rgba(0, 100, 255, 1) 80%,*/
                    /*        transparent 100%*/
                    /*);*/
            position: absolute;
            inset: -15%;
            z-index: 1;
            pointer-events: none;
        }

        .static-rays-0-20 { /* 0 / 20 */
            opacity: 0; /* hide bottom line - temporary */
            filter: blur(2px);
            background:
                    radial-gradient(
                            10% 1px at 35% 80%,
                            rgba(0, 100, 255, 0.25) 0%,
                            rgba(0, 100, 255, 0.25) 80%,
                            transparent 100%
                    ),
                    radial-gradient(
                            25% 1px at 75% 80%,
                            rgba(0, 100, 255, 0.25) 0%,
                            rgba(0, 100, 255, 0.25) 80%,
                            transparent 100%
                    );
            position: absolute;
            inset: -15%;
            z-index: 1;
            pointer-events: none;
        }


        .waves {
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            position: relative;
            perspective: 800px;
        }


        .wave {
            rotate: 38deg;
            /*opacity: 1;*/
            perspective: 800px;
            background:
            /*
                radial-gradient(
                    27% 5% at 54% 95%,
                    rgba(0, 100, 255, 0.4) 0%,
                    rgba(0, 100, 255, 0.4) 80%,
                    transparent 82%
                ),
                radial-gradient(
                    57% 15% at 54% 85%,
                    rgba(0, 100, 255, 0.15) 0%,
                    rgba(0, 100, 255, 0.15) 80%,
                    transparent 82%
                );
             */
                radial-gradient(
                    27% 5% at 62% 91%,
                    rgba(120, 160, 220, 0.3) 0%,
                    rgba(120, 160, 220, 0.3) 90%,
                    transparent
                ),
                radial-gradient(
                    57% 16% at 54% 82%,
                    rgb(39, 68, 159, 0.2) 0%,
                    rgb(39, 68, 159, 0.2) 80%,
                    transparent
                ),
                radial-gradient(
                    46% 12% at 64% 65%,
                    rgb(39, 68, 159, 0.3) 0%,
                    rgb(39, 68, 159, 0.3) 90%,
                    transparent 82%
                ),
                radial-gradient(
                    65% 22% at 64% 34%,
                    rgb(39, 68, 159, 0.2) 0%,
                    rgb(39, 68, 159, 0.2) 80%,
                    transparent 82%
                );
                /*radial-gradient(*/
                /*    35% 22% at 64% -34%,*/
                /*    rgba(17, 255, 0, 0.9) 0%,*/
                /*    rgba(17, 255, 0, 0.9) 80%,*/
                /*    transparent 82%*/
                );
            filter: blur(15px);
            opacity: .3;
            pointer-events: none;
            position: absolute;
            inset: -15%;
            mix-blend-mode: screen;
            transform: translate(-15%, 85%);
        }

        .wave-1 {
            transform-origin: 110% 125%;
            animation: moveWave2k 8s linear infinite forwards;
        }

        .wave-2 {
            transform-origin: 110% 115%;
            animation-delay: 0.3s;
            animation: moveWave2k 8s linear infinite forwards;
        }

        @keyframes moveWave2k {
            0% {
                transform: translate(-10%, 95%) scaleX(1) scaleY(1) scaleZ(1);
            }
            100% {
                transform: scaleX(0.2) scaleY(1.7) scaleZ(3);
            }
        }
    </style>
</head>
<body>
<div class="red-blue-background">
    <div class="static-rays-40"></div>
    <div class="static-rays-32"></div>
    <div class="static-rays-0-35"></div>
    <div class="static-rays-0-20"></div>
    <div class="waves">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
    </div>
</div>
</body>
